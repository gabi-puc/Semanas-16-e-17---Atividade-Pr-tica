<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mundo Tour - Cadastro de Lugar</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
          <a class="navbar-brand" href="index.html">
            <i class="bi bi-globe-americas"></i> Mundo Tour
          </a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
              <li class="nav-item">
                <a class="nav-link" href="index.html">Início</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="index.html#lugares">Lugares</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="index.html#sobre">Sobre</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main>
      <section class="py-5">
        <div class="container">
          <div class="row justify-content-center">
            <div class="col-md-8">
              <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 id="form-title" class="section-title mb-0">Novo Lugar</h2>
                <a href="index.html" class="btn btn-outline-secondary btn-sm">
                  <i class="bi bi-arrow-left"></i> Voltar
                </a>
              </div>

              <div id="alert-container"></div>

              <form id="form-lugar">
                <div class="mb-3">
                  <label for="nome" class="form-label">Nome <span class="text-danger">*</span></label>
                  <input type="text" class="form-control" id="nome" required />
                </div>

                <div class="mb-3">
                  <label for="descricao" class="form-label">Descrição <span class="text-danger">*</span></label>
                  <textarea class="form-control" id="descricao" rows="3" required></textarea>
                </div>

                <div class="mb-3">
                  <label for="conteudo" class="form-label">Conteúdo</label>
                  <textarea class="form-control" id="conteudo" rows="4"></textarea>
                </div>

                <div class="mb-3">
                  <label for="localizacao" class="form-label">Localização <span class="text-danger">*</span></label>
                  <input type="text" class="form-control" id="localizacao" required />
                </div>

                <div class="mb-3">
                  <label for="categoria" class="form-label">Categoria</label>
                  <select class="form-select" id="categoria">
                    <option value="Natureza">Natureza</option>
                    <option value="Monumento">Monumento</option>
                    <option value="Patrimônio Histórico">Patrimônio Histórico</option>
                    <option value="Ilha">Ilha</option>
                    <option value="Outro">Outro</option>
                  </select>
                </div>

                <div class="mb-3 form-check">
                  <input type="checkbox" class="form-check-input" id="destaque" />
                  <label class="form-check-label" for="destaque">Destaque</label>
                </div>

                <div class="mb-3">
                  <label for="data" class="form-label">Data</label>
                  <input type="date" class="form-control" id="data" />
                </div>

                <div class="mb-3">
                  <label for="imagemPrincipal" class="form-label">Imagem Principal</label>
                  <input type="text" class="form-control" id="imagemPrincipal" placeholder="ex: assets/img/lugar.jpg" />
                </div>

                <div class="d-flex gap-2">
                  <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i> Salvar
                  </button>
                  <a href="index.html" class="btn btn-outline-secondary">Cancelar</a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="bg-dark text-white text-center py-3">
      <div class="container">
        <p class="mb-0">&copy; 2025 Gabriela Santos. Todos os direitos reservados.</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/cadastro.js"></script>
  </body>
</html>
